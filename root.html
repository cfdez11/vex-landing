<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{metadata.title}}</title>
  <meta name="description" content="{{metadata.description}}" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            vex: {
              50:  '#f5f3ff',
              100: '#ede9fe',
              200: '#ddd6fe',
              300: '#c4b5fd',
              400: '#a78bfa',
              500: '#8b5cf6',
              600: '#7c3aed',
              700: '#6d28d9',
              800: '#5b21b6',
              900: '#4c1d95',
            }
          },
          fontFamily: {
            sans: ['Inter', 'system-ui', 'sans-serif'],
            mono: ['JetBrains Mono', 'Fira Code', 'monospace'],
          }
        }
      }
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="icon" type="image/x-icon" href="/favicon.ico" />

  <style>
    * { -webkit-font-smoothing: antialiased; }
    html { scroll-behavior: smooth; }

    .gradient-text {
      background: linear-gradient(135deg, #7c3aed 0%, #a78bfa 50%, #6366f1 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero-glow {
      background: radial-gradient(ellipse 80% 50% at 50% -10%, rgba(139,92,246,0.12) 0%, transparent 70%);
    }

    .dot-pattern {
      background-image: radial-gradient(circle, #d4d4d8 1px, transparent 1px);
      background-size: 28px 28px;
    }

    .card-hover { transition: transform 0.2s ease, box-shadow 0.2s ease; }
    .card-hover:hover { transform: translateY(-3px); box-shadow: 0 12px 40px rgba(124,58,237,0.1); }

    .strategy-card { transition: all 0.2s; }
    .strategy-card:hover { transform: translateX(4px); }

    .nav-blur { backdrop-filter: blur(12px); background: rgba(255,255,255,0.85); }

    .badge { background: linear-gradient(135deg, #ede9fe, #ddd6fe); color: #6d28d9; }

    .code-block { background: #0f0f13; border: 1px solid #1e1e2e; }
  </style>
</head>
<body class="bg-white text-zinc-800 font-sans">
  <div id="app-root">
    {{props.children}}
  </div>
</body>
</html>
